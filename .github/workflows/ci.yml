name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm deps:check

      - run: pnpm deps:check:peers

      - run: pnpm --filter @electron-ipc-bridge/shared build

      - run: pnpm --filter @electron-ipc-bridge/core build

      - run: pnpm --filter @electron-ipc-bridge/vite-plugin build

      - run: pnpm lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm deps:check

      - run: pnpm deps:check:peers

      - run: pnpm --filter @electron-ipc-bridge/shared --filter @electron-ipc-bridge/core --filter @electron-ipc-bridge/vite-plugin test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm deps:check

      - run: pnpm deps:check:peers

      - run: pnpm --filter @electron-ipc-bridge/shared build

      - run: pnpm --filter @electron-ipc-bridge/core build

      - run: pnpm --filter @electron-ipc-bridge/vite-plugin build

      - run: pnpm --filter docs typecheck

      - run: pnpm --filter docs build
