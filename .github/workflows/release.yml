name: Release

on:
  release:
    types:
      - published

permissions:
  contents: write
  id-token: write
  pages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.event.release.tag_name, 'core-v') }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @electron-ipc-bridge/shared build

      - run: pnpm --filter @electron-ipc-bridge/core build

      - run: pnpm --filter @electron-ipc-bridge/vite-plugin build

      - run: pnpm --filter @electron-ipc-bridge/core pack

      - run: pnpm --filter @electron-ipc-bridge/vite-plugin pack

      - run: gh release upload "${{ github.event.release.tag_name }}" packages/core/*.tgz packages/vite-plugin/*.tgz --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: pnpm --filter @electron-ipc-bridge/core publish --access public --provenance --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - run: pnpm --filter @electron-ipc-bridge/vite-plugin publish --access public --provenance --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  docs:
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.event.release.tag_name, 'core-v') }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter docs build

      - uses: actions/upload-pages-artifact@v4
        with:
          path: apps/docs/build

      - id: deployment
        uses: actions/deploy-pages@v4
